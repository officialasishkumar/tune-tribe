server {
  listen 80;
  server_name _;
  server_tokens off;
  client_max_body_size 2m;

  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' http: https:; font-src 'self' https: data:; frame-ancestors 'none'; img-src 'self' https: data:; script-src 'self'; style-src 'self' 'unsafe-inline';" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
