services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tunetribe}
      MYSQL_USER: ${MYSQL_USER:-tunetribe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in your environment or .env file}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in your environment or .env file}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      TUNETRIBE_SECRET_KEY: ${TUNETRIBE_SECRET_KEY:?set TUNETRIBE_SECRET_KEY in your environment or .env file}
      TUNETRIBE_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-tunetribe}:${MYSQL_PASSWORD:?set MYSQL_PASSWORD in your environment or .env file}@mysql:3306/${MYSQL_DATABASE:-tunetribe}?charset=utf8mb4
      TUNETRIBE_CORS_ORIGINS: ${TUNETRIBE_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      TUNETRIBE_ALLOWED_HOSTS: ${TUNETRIBE_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      TUNETRIBE_SEED_DEMO_DATA: ${TUNETRIBE_SEED_DEMO_DATA:-false}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
