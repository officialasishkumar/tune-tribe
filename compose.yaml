services:
  backend:
    build:
      context: ./backend
    environment:
      TUNETRIBE_SECRET_KEY: change-this-secret-key-before-production-please
      TUNETRIBE_DATABASE_URL: sqlite:///./tunetribe.db
      TUNETRIBE_CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      TUNETRIBE_ALLOWED_HOSTS: localhost,127.0.0.1,backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend
