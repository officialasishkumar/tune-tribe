services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tunetribe}
      POSTGRES_USER: ${POSTGRES_USER:-tunetribe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your environment or .env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      TUNETRIBE_SECRET_KEY: ${TUNETRIBE_SECRET_KEY:?set TUNETRIBE_SECRET_KEY in your environment or .env file}
      TUNETRIBE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-tunetribe}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your environment or .env file}@postgres:5432/${POSTGRES_DB:-tunetribe}
      TUNETRIBE_CORS_ORIGINS: ${TUNETRIBE_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      TUNETRIBE_ALLOWED_HOSTS: ${TUNETRIBE_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      TUNETRIBE_SEED_DEMO_DATA: ${TUNETRIBE_SEED_DEMO_DATA:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
